<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="login&signup.css">
    <link rel="icon" href="photos/images.png">
</head>

<body>
    <div class="wrapper">
        <h1>Log In</h1>
        <form id="login-form">
            <div class="input-group">
                <img src="photos/person_icon.svg" alt="User Icon">
                <input type="text" name="username" id="username-input" placeholder="Username" required>
            </div>

            <div class="input-group">
                <img src="photos/lock_icon.svg" alt="Password Icon">
                <input type="password" name="password" id="password-input" placeholder="Password" required>
            </div>

            <button type="submit">Log In</button>
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </form>
    </div>

    <script>
        document.getElementById("login-form").addEventListener("submit", async function (event) {
            event.preventDefault();

            const usernameInput = document.getElementById("username-input").value.trim();
            const passwordInput = document.getElementById("password-input").value;

            try {
                // 1. Check localStorage first (for newly signed-up users)
                let users = JSON.parse(localStorage.getItem("users_db"));

                // 2. If localStorage is empty, fetch from the original JSON file
                if (!users) {
                    const response = await fetch("users.json");
                    if (!response.ok) throw new Error("Could not load user data.");
                    const data = await response.json();
                    users = data.users;

                    // Optional: Sync JSON users to localStorage so they stay together
                    localStorage.setItem("users_db", JSON.stringify(users));
                }

                // 3. Find the user in the combined list
                const user = users.find(u => u.username === usernameInput && u.password === passwordInput);

                if (user) {
                    // Store only the LOGGED IN user specifically for the dashboard to use
                    localStorage.setItem("currentUser", JSON.stringify(user));

                    alert(`Welcome, ${user.name}!`);

                    // 4. Redirect based on user type
                    switch (user.type) {
                        case "admin":
                            window.location.href = "adminDashboard.html";
                            break;
                        case "business":
                            window.location.href = "businessDashboard.html";
                            break;
                        case "costumer": // Matching your JSON typo
                            window.location.href = "homePage.html";
                            break;
                        default:
                            alert("User type not recognized.");
                    }
                } else {
                    alert("Invalid username or password!");
                }

            } catch (error) {
                console.error("Login Error:", error);
                alert("An error occurred. Make sure you are using a Live Server.");
            }
        });
    </script>
</body>

</html>
