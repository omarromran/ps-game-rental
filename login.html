<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="login&signup.css">
    <link rel="icon" href="photos/images.png">
</head>

<body>
    <div class="wrapper">
        <h1>Log In</h1>

        <form id="login-form">

            <div class="input-group">
                <img src="photos/person_icon.svg" alt="User Icon">
                <input type="text" id="username-input" placeholder="Username" required>
            </div>

            <div class="input-group">
                <img src="photos/lock_icon.svg" alt="Password Icon">
                <input type="password" id="password-input" placeholder="Password" required>
            </div>

            <button type="submit">Log In</button>

            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>

        </form>
    </div>

<script>

document.getElementById("login-form").addEventListener("submit", function(event){

    event.preventDefault();

    const usernameInput = document.getElementById("username-input").value.trim();
    const passwordInput = document.getElementById("password-input").value;

    // Get users from localStorage
    let users = JSON.parse(localStorage.getItem("users_db")) || [];

    if(users.length === 0){
        alert("No users found. Please sign up first.");
        return;
    }

    // Find matching user
    const user = users.find(u => 
        u.username === usernameInput && 
        u.password === passwordInput
    );

    if(user){

        // Save logged in user
        localStorage.setItem("currentUser", JSON.stringify(user));

        alert("Welcome " + user.username + "!");

        // Redirect depending on account type
        if(user.type === "business"){
            window.location.href = "businessDashboard.html";
        }
        else if(user.type === "customer"){
            window.location.href = "homePage.html";
        }
        else if(user.type === "admin"){
            window.location.href = "adminDashboard.html";
        }
        else{
            window.location.href = "homePage.html";
        }

    }
    else{
        alert("Invalid username or password!");
    }

});

</script>

</body>

</html>
