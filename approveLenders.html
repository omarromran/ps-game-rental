<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve Lenders</title>
    <link rel="stylesheet" href="approveLenders.css">
    <link rel="icon" href="photos/logo3.jpg">
</head>

<body>
    <div class="table-container">
        <h2>Pending Lender Approvals</h2>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Store Name</th>
                    <th>Owner</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="lender-table-body">
            </tbody>
        </table>
    </div>

    <script>

        let users = [];

        function loadPendingLenders() {
            const storedUsers = localStorage.getItem("users");
            if (storedUsers) {
                users = JSON.parse(storedUsers);
                renderTable();
            } else {
                document.getElementById('lender-table-body').innerHTML = "<tr><td colspan='6' style='text-align: center'>No user data found. Go to Dashboard first.</td></tr>";
            }
        }

        function renderTable() {
            const tableBody = document.getElementById('lender-table-body');
            tableBody.innerHTML = "";

            const pendingLenders = users.filter(u => u.status === "pending" && u.type === "business");

            if (pendingLenders.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='6' style='text-align: center'>No pending approvals.</td></tr>";
                return;
            }

            pendingLenders.forEach(lender => {
                const row = `
            <tr id="row-${lender.userID}">
                <td data-label="ID">${lender.userID}</td>
                <td data-label="Store Name"><strong>${lender.username}</strong></td>
                <td data-label="Owner">${lender.name}</td>
                <td data-label="Email">${lender.email}</td>
                <td data-label="Status"><span class="status-badge">Pending</span></td>
                <td data-label="Actions">
                    <button class="btn-check" onclick="handleApproval(${lender.userID}, 'Approved')">
                         Accept
                    </button>
                    <button class="btn-trash" onclick="handleApproval(${lender.userID}, 'Decline')">
                         Decline
                    </button>
                </td>
            </tr>
        `;
                tableBody.innerHTML += row;
            });
        }

        function handleApproval(id, action) {
            const userIndex = users.findIndex(u => u.userID === id);
            if (userIndex === -1) return;

            if (action === 'Approved') {
                users[userIndex].status = "accepted";
            } else {
                users.splice(userIndex, 1);
            }

            localStorage.setItem("users", JSON.stringify(users));
            alert(`Lender has been ${action}`);

            const row = document.getElementById(`row-${id}`);
            row.style.background = action == 'Approved' ? "rgba(46, 204, 113, 0.2)" : "rgba(231, 76, 60, 0.2)";

            setTimeout(() => {
                row.remove();
                if (users.filter(u => u.status === "pending" && u.type === "business").length === 0) {
                    renderTable();
                }
            }, 500);
        }

        document.addEventListener("DOMContentLoaded", loadPendingLenders);

    </script>

</body>

</html>
