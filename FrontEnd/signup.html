<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="cssFiles/login&signup.css">
    <link rel="icon" href="photos/images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="wrapper">
        <h1>Sign Up</h1>
        <form id="signup-form">

            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="name-input" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" id="email-input" placeholder="Email" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username-input" placeholder="Username" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password-input" placeholder="Password" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirm-password-input" placeholder="Confirm Password" required>
            </div>

            <div class="account-type">
                <label>
                    <input type="radio" name="account-type" value="customer" checked>
                    Customer
                </label>

                <label>
                    <input type="radio" name="account-type" value="business">
                    Business
                </label>
            </div>

            <button type="submit">Sign Up</button>

            <p>Already have an account? <a href="login.html">Log In</a></p>
        </form>
    </div>

    <script>
        document.getElementById("signup-form").addEventListener("submit", async e => {
            e.preventDefault();

            const name = document.getElementById("name-input").value.trim();
            const email = document.getElementById("email-input").value.trim();
            const username = document.getElementById("username-input").value.trim();
            const password = document.getElementById("password-input").value;
            const confirmPassword = document.getElementById("confirm-password-input").value;
            const type = document.querySelector('input[name="account-type"]:checked').value;

            if (!/^\S+$/.test(username)) {
                alert("Username must not contain spaces.");
                return;
            }

            if (!/^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email)) {
                alert("Please enter a valid email.");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                let users = JSON.parse(localStorage.getItem("users")) || [];

                if (!users.length) {
                    const res = await fetch("users.json");
                    const data = await res.json();
                    users = data.users || [];
                    localStorage.setItem("users", JSON.stringify(users));
                }

                if (users.some(u => u.username === username)) {
                    alert("Username already taken!");
                    return;
                }

                if (users.some(u => u.email === email)) {
                    alert("Email already registered!");
                    return;
                }

                const userID = users.length ? Math.max(...users.map(u => u.userID)) + 1 : 1;

                const newUser = {
                    userID,
                    name,
                    username,
                    email,
                    password,
                    type,
                    status: type === "business" ? "pending" : "active"
                };

                users.push(newUser);
                localStorage.setItem("users", JSON.stringify(users));

                alert("Account created successfully!");
                window.location.href = "login.html";

            } catch {
                alert("Error accessing user data. Make sure you are using Live Server.");
            }
        });
    </script>
</body>

</html>
