<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GameLend</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="dashboard-wrapper">

        <aside class="sidebar">
            <h2>GameLend</h2>

            <nav>
                <a href="gamerDashboard.html">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="myRentals.html">
                    <i class="fas fa-folder-open"></i> My Rentals
                </a>
                <a href="profile.html" class="active">
                    <i class="fas fa-user"></i> Profile
                </a>
            </nav>

            <button class="logout" onclick="window.location.href='login.html'">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>

        <main>
            <h2>Profile</h2>

            <div class="profile-container">

                <div class="profile-top">
                    <div class="profile-avatar">ZA</div>
                    <div>
                        <h3>zeina ahmed</h3>
                        <p>zeina@email.com</p>
                    </div>
                </div>

                <div class="profile-item">
                    <span class="profile-dot"></span>
                    <span class="profile-key">Username</span>
                    <span class="profile-val">Zeina ahmed</span>
                </div>

                <div class="profile-item">
                    <span class="profile-dot"></span>
                    <span class="profile-key">Phone</span>
                    <span class="profile-val">+20 123 456 7890</span>
                </div>

                <div class="profile-item">
                    <span class="profile-dot"></span>
                    <span class="profile-key">Member Since</span>
                    <span class="profile-val">March 2024</span>
                </div>

                <div class="profile-item">
                    <span class="profile-dot"></span>
                    <span class="profile-key">Total Rentals</span>
                    <span class="profile-val">3 Games</span>
                </div>

            </div>
        </main>

    </div>

</body>
</html>
