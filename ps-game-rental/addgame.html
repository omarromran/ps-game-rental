<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Game - PS Rental Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <h2 class="logo">PS HUB</h2>
            <nav>
                <a href="dashboard.html">Store Dashboard</a>
                <a href="add-game.html" class="active">Add New Game</a>
                <a href="manage-games.html">Manage Games</a>
                <a href="rental-requests.html">Rental Requests</a>
            </nav>
            <button class="logout" id="logoutBtn">Logout</button>
        </aside>

        <main class="main-content">
            <header>
                <h1>List a New Game</h1>
                <p>Fill out the details below to add a game to your rental library.</p>
            </header>

            <form id="addGameForm">
                <div class="form-group">
                    <label for="gameTitle">Game Title</label>
                    <input type="text" id="gameTitle" placeholder="e.g. Elden Ring" required>
                </div>

                <div class="form-group">
                    <label for="platform">Platform</label>
                    <select id="platform" required>
                        <option value="">Select Platform</option>
                        <option value="PS5">PlayStation 5</option>
                        <option value="PS4">PlayStation 4</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="genre">Genre</label>
                    <select id="genre" required>
                        <option value="">Select Genre</option>
                        <option value="Action">Action</option>
                        <option value="RPG">RPG</option>
                        <option value="Sports">Sports</option>
                        <option value="Horror">Horror</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dailyPrice">Daily Price ($)</label>
                    <input type="number" id="dailyPrice" step="0.01" placeholder="5.00" required>
                </div>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <textarea id="description" rows="4" placeholder="Mention disc condition or DLCs..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Add Game to Store</button>
            </form>
        </main>
    </div>

    <script src="navigation.js"></script>
    <script src="add-game.js"></script>
</body>
</html>
