<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leave Review - GameLend</title>
  <link rel="stylesheet" href="review.css">
</head>
<body>

<div class="review-container">
  <h2>Leave a Review</h2>
  
  <div class="game-title">
    Game: <strong>Fortnite</strong>
  </div>
  
  <div class="rating">
    Rating:
    <select id="rating">
      <option value="1">★☆☆☆☆</option>
      <option value="2">★★☆☆☆</option>
      <option value="3">★★★☆☆</option>
      <option value="4">★★★★☆</option>
      <option value="5">★★★★★</option>
    </select>
  </div>
  
  <div class="comment">
    Comment:
    <textarea id="comment" rows="5" placeholder="Write your review here..."></textarea>
  </div>
  
  <div class="buttons">
    <button id="submit">Submit Review</button>
    <button id="cancel" onclick="window.history.back()">Cancel</button>
  </div>
</div>

</body>
</html>
