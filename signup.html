<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="login&signup.css">
    <link rel="icon" href="photos/images.png">
</head>

<body>
    <div class="wrapper">
        <h1>Sign Up</h1>

        <form id="signup-form">
            <!-- Account Type -->
            <div class="account-type">
                <span>Account Type:</span>
                <label><input type="radio" name="account-type" value="costumer" checked> Customer</label>
                <label><input type="radio" name="account-type" value="business"> Business</label>
            </div>

            <!-- Input Fields -->
            <div class="input-group">
                <img src="photos/person_icon.svg" alt="Full Name">
                <input type="text" id="name-input" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <img src="photos/email_icon.svg" alt="Email">
                <input type="email" id="email-input" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <img src="photos/person_icon.svg" alt="Username">
                <input type="text" id="username-input" placeholder="Username" required>
            </div>

            <div class="input-group">
                <img src="photos/lock_icon.svg" alt="Password">
                <input type="password" id="password-input" placeholder="Password" required>
            </div>

            <div class="input-group">
                <img src="photos/lock_icon.svg" alt="Confirm Password">
                <input type="password" id="confirm-password-input" placeholder="Confirm Password" required>
            </div>

            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="login.html">Log In</a></p>
        </form>
    </div>

    <script>
        document.getElementById("signup-form").addEventListener("submit", async function (event) {
            event.preventDefault();

            const name = document.getElementById("name-input").value;
            const email = document.getElementById("email-input").value;
            const username = document.getElementById("username-input").value;
            const password = document.getElementById("password-input").value;
            const confirmPassword = document.getElementById("confirm-password-input").value;
            const type = document.querySelector('input[name="account-type"]:checked').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                // 1. Get the list of users
                // We check localStorage first. If empty, we fetch from the .json file.
                let users = JSON.parse(localStorage.getItem("users_db"));

                if (!users) {
                    const response = await fetch("users.json");
                    const data = await response.json();
                    users = data.users;
                }

                // 2. Check if username is already taken
                if (users.some(u => u.username === username)) {
                    alert("Username already taken! Please choose another.");
                    return;
                }

                // 3. Create the New User Object
                const newUser = {
                    userID: users.length > 0 ? Math.max(...users.map(u => u.userID)) + 1 : 1,
                    name: name,
                    username: username,
                    email: email,
                    password: password,
                    type: type
                };

                // 4. Add to the list and SAVE to localStorage
                users.push(newUser);
                localStorage.setItem("users_db", JSON.stringify(users));

                console.log("User saved to local database:", newUser);

                alert("Registration Successful! You can now log in.");
                window.location.href = "login.html";

            } catch (error) {
                console.error("Error during signup:", error);
                alert("Error accessing user data. Make sure you are using a Live Server.");
            }
        });
    </script>
</body>

</html>
