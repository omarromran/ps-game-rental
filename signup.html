<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="login&signup.css">
    <link rel="icon" href="photos/images.png">
</head>

<body>
    <div class="wrapper">
        <h1>Sign Up</h1>

        <form id="signup-form">

            <!-- Full Name -->
            <div class="input-group">
                <img src="photos/person_icon.svg" alt="Full Name">
                <input type="text" id="name-input" placeholder="Full Name" required>
            </div>

            <!-- Email -->
            <div>
                <label for="email-input">
                    <img src="photos/email_icon.svg" alt="Email">
                </label>
                <input type="email" id="email-input" placeholder="Email" required>
            </div>

            <!-- Username -->
            <div class="input-group">
                <img src="photos/person_icon.svg" alt="Username">
                <input type="text" id="username-input" placeholder="Username" required>
            </div>

            <!-- Password -->
            <div class="input-group">
                <img src="photos/lock_icon.svg" alt="Password">
                <input type="password" id="password-input" placeholder="Password" required>
            </div>

            <!-- Confirm Password -->
            <div class="input-group">
                <img src="photos/lock_icon.svg" alt="Confirm Password">
                <input type="password" id="confirm-password-input" placeholder="Confirm Password" required>
            </div>

            <!-- Account Type -->
            <div class="account-type">
                <label>
                    <input type="radio" name="account-type" value="customer" checked>
                    Customer
                </label>
                <label>
                    <input type="radio" name="account-type" value="business">
                    Business
                </label>
            </div>

            <button type="submit">Create Account</button>

            <p>Already have an account? <a href="login.html">Log In</a></p>

        </form>
    </div>
<script>
document.getElementById("signup-form").addEventListener("submit", function(event){
    event.preventDefault();

    // Get values from inputs
    const name = document.getElementById("name-input").value.trim();
    const email = document.getElementById("email-input").value.trim();
    const username = document.getElementById("username-input").value.trim();
    const password = document.getElementById("password-input").value;
    const confirmPassword = document.getElementById("confirm-password-input").value;
    const type = document.querySelector('input[name="account-type"]:checked').value;

    // Password validation
    if(password !== confirmPassword){
        alert("Passwords do not match!");
        return;
    }

    // Get users from localStorage
    let users = JSON.parse(localStorage.getItem("users_db")) || [];

    // Check if username exists
    if(users.some(user => user.username.toLowerCase() === username.toLowerCase())){
        alert("Username already exists!");
        return;
    }

    // Generate unique ID
    let newID = users.length > 0 ? Math.max(...users.map(u => u.userID)) + 1 : 1;

    // Create new user object
    const newUser = {
        userID: newID,
        name: name,
        username: username,
        email: email,
        password: password,
        type: type
    };

    // Save user
    users.push(newUser);
    localStorage.setItem("users_db", JSON.stringify(users));

    console.log("Saved user:", newUser);

    alert("Account created successfully!");
    window.location.href = "login.html";
});
</script>

</body>
</html>
