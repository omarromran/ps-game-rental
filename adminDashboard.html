<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="icon" href="photos/images.png">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="dashboard.js"></script>
</head>

<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <h2>Admin</h2>
            <nav>
                <button onclick="showSection('dashboard', this)" class="active">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </button>
                <button onclick="showSection('games', this)">
                    <i class="fas fa-gamepad"></i> Games
                </button>
                <button onclick="showSection('users', this)">
                    <i class="fas fa-users"></i> Users
                </button>
            </nav>
            <button class="logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>

        <main>
            <!-- Dashboard Overview Cards -->
            <section id="dashboard">
                <div class="card-container" id="dashboard-cards"></div>
            </section>

            <!-- Games Table -->
            <section id="games">
                <h2>Games</h2>
                <table id="games-table"></table>
            </section>

            <!-- Users Table -->
            <section id="users">
                <div class="users-header">
                    <h2>Users</h2>
                    <select id="user-type-filter">
                        <option value="all">All User Types</option>
                        <option value="admin">Admin</option>
                        <option value="business">Business</option>
                        <option value="customer">Customer</option>
                    </select>
                </div>
                <table id="users-table"></table>
            </section>
        </main>
    </div>

</body>

</html>
