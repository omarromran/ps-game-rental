<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="icon" href="photos/images.png">
    <link rel="stylesheet" href="dashboard.css">

    <!-- FontAwesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script defer src="dashboard.js"></script>
</head>

<body>

<div class="dashboard-wrapper">

<!-- SIDEBAR -->
<aside class="sidebar">

    <h2 class="logo">Admin Panel</h2>

    <nav>

        <button class="nav-btn active" onclick="showSection('dashboard',this)">
            <i class="fas fa-chart-line"></i>
            Dashboard
        </button>

        <button class="nav-btn" onclick="showSection('games',this)">
            <i class="fas fa-gamepad"></i>
            Games
        </button>

        <button class="nav-btn" onclick="showSection('users',this)">
            <i class="fas fa-users"></i>
            Users
        </button>

        <button class="nav-btn" onclick="showSection('addAdmin',this)">
            <i class="fas fa-user-shield"></i>
            Add Admin
        </button>

    </nav>

    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        Logout
    </button>

</aside>



<!-- MAIN CONTENT -->
<main class="main-content">

<!-- DASHBOARD -->
<section id="dashboard" class="section active-section">

    <h2>Dashboard Overview</h2>

    <div class="card-container" id="dashboard-cards">

        <!-- Cards inserted by dashboard.js -->

    </div>

</section>



<!-- GAMES SECTION -->
<section id="games" class="section">

    <div class="section-header">

        <h2>Manage Games</h2>

        <button class="action-btn" onclick="showAddGameForm()">
            <i class="fas fa-plus"></i>
            Add Game
        </button>

    </div>

    <table id="games-table">

        <!-- Games inserted by JS -->

    </table>

</section>



<!-- USERS SECTION -->
<section id="users" class="section">

    <div class="section-header">

        <h2>Manage Users</h2>

        <select id="user-type-filter" onchange="renderUsersTable()">

            <option value="all">All Users</option>
            <option value="admin">Admin</option>
            <option value="business">Business</option>
            <option value="customer">Customer</option>

        </select>

    </div>

    <table id="users-table">

        <!-- Users inserted by JS -->

    </table>

</section>



<!-- ADD ADMIN -->
<section id="addAdmin" class="section">

<h2>Create New Admin</h2>

<form id="add-admin-form">

    <div class="form-group">
        <input type="text" name="name" placeholder="Full Name" required>
    </div>

    <div class="form-group">
        <input type="text" name="username" placeholder="Username" required>
    </div>

    <div class="form-group">
        <input type="email" name="email" placeholder="Email" required>
    </div>

    <div class="form-group">
        <input type="password" name="password" placeholder="Password" required>
    </div>

    <div class="form-group">
        <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
    </div>

    <button type="submit" class="submit-btn">

        <i class="fas fa-user-plus"></i>
        Create Admin

    </button>

</form>

</section>

</main>

</div>



<!-- ADD GAME MODAL -->
<div id="add-game-modal" class="modal">

<div class="modal-content">

<span class="close-btn" onclick="closeAddGameForm()">&times;</span>

<h2>Add New Game</h2>

<form id="add-game-form">

    <div class="form-group">
        <input type="text" name="name" placeholder="Game Name" required>
    </div>

    <div class="form-group">
        <input type="text" name="platform" placeholder="Platform (PS5, PS4...)" required>
    </div>

    <div class="form-group">
        <input type="text" name="genre" placeholder="Genre" required>
    </div>

    <div class="form-group">
        <input type="text" name="vendor" placeholder="Vendor / Company" required>
    </div>

    <div class="form-group">

        <!-- PRICE FIELD ADDED -->

        <input 
        type="number" 
        name="price" 
        placeholder="Price (EGP)" 
        min="250"
        max="1000"
        required>

    </div>

    <div class="form-group">

        <textarea 
        name="description" 
        placeholder="Game Description">

        </textarea>

    </div>

    <button type="submit" class="submit-btn">

        <i class="fas fa-plus"></i>
        Add Game

    </button>

</form>

</div>

</div>


</body>
</html>
