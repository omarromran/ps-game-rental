<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">
        <div id="display" class="display">0</div>
        <div class="buttons">
            <button class="btn fn" data-action="clear">AC</button>
            <button class="btn fn">+/-</button>
            <button class="btn fn">%</button>
            <button class="btn op" data-action="divide">÷</button>

            <button class="btn num">7</button>
            <button class="btn num">8</button>
            <button class="btn num">9</button>
            <button class="btn op" data-action="multiply">×</button>

            <button class="btn num">4</button>
            <button class="btn num">5</button>
            <button class="btn num">6</button>
            <button class="btn op" data-action="subtract">-</button>

            <button class="btn num">1</button>
            <button class="btn num">2</button>
            <button class="btn num">3</button>
            <button class="btn op" data-action="add">+</button>

            <button class="btn num zero" data-number="0">0</button>
            <button class="btn num">.</button>
            <button class="btn op" data-action="calculate">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
